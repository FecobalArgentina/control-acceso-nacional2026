<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Acceso QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>


<style>


body{

font-family:Arial,sans-serif;

background:#f1f1f1;

margin:0;

padding:15px;

text-align:center;

}



.contenedor{

max-width:520px;

margin:auto;

background:white;

padding:20px;

border-radius:18px;

box-shadow:0 3px 12px #999;

}



.logos{

display:flex;

justify-content:space-between;

align-items:center;

}



.logos img{

width:120px;

height:80px;

object-fit:contain;

}



.titulo{

margin-top:15px;

background:#003b70;

color:white;

padding:18px;

border-radius:15px;

font-size:24px;

font-weight:bold;

}



h2{

color:#003b70;

}



.boton{

width:100%;

padding:20px;

margin-top:15px;

border:0;

border-radius:15px;

font-size:22px;

font-weight:bold;

background:#003b70;

color:white;

}



.botonCancha{

background:#003b70;

margin-top:12px;

}



.sede{

font-size:22px;

font-weight:bold;

}



.dato{

background:#eee;

padding:14px;

margin-top:10px;

border-radius:10px;

font-size:19px;

}



.ok{

background:#d4edda;

color:#155724;

padding:18px;

border-radius:12px;

font-size:24px;

font-weight:bold;

}



.error{

background:#f8d7da;

color:#721c24;

padding:18px;

border-radius:12px;

font-size:22px;

font-weight:bold;

}



.ingreso{

background:#003b70;

color:white;

padding:15px;

margin-top:15px;

border-radius:12px;

font-size:22px;

}



.oculto{

display:none;

}



</style>


</head>


<body>


<div class="contenedor">


<div class="logos">

<img src="imagenes/logo_fecobal.png">

<img src="imagenes/logo_cah.png">

</div>



<div class="titulo">

🏆 NACIONAL DE CLUBES<br>

ADULTOS A 2026

</div>
<h2 id="tituloControl">
CONTROL DE ACCESO
</h2>



<div id="selectorCancha">


<h2>

Seleccione punto de acceso

</h2>


<button class="boton botonCancha" onclick="seleccionarCancha('Cancha 1')">

🏟️ Cancha 1<br>
Jockey Club

</button>



<button class="boton botonCancha" onclick="seleccionarCancha('Cancha 2')">

🏟️ Cancha 2<br>
IPEF

</button>



<button class="boton botonCancha" onclick="seleccionarCancha('Cancha 3')">

🏟️ Cancha 3<br>
Alta Gracia

</button>


</div>





<div id="control" class="oculto">


<div class="sede" id="sede"></div>


<button class="boton" onclick="iniciarScanner()">

📷 ESCANEAR QR

</button>



<button 
class="boton"
onclick="cambiarCancha()">

🔄 CAMBIAR CANCHA

</button>



<div id="lector"></div>



<div id="resultado"></div>



<button

id="confirmar"

class="boton oculto"

onclick="confirmarIngreso()">

✅ CONFIRMAR INGRESO

</button>



<button

id="nuevo"

class="boton oculto"

onclick="nuevoEscaneo()">

🔄 ESCANEAR SIGUIENTE

</button>


</div>



</div>



<script>



const API_URL =
"https://script.google.com/macros/s/AKfycbzNB_Xb8n62PgtbQKiVOGshX0bEzadaC-99jRtdPCMp-MeTnXLaOlwfyAwfBIf95uP4/exec";



let canchaActual="";

let codigoActual="";

let scanner=null;



const sedes={


"Cancha 1":"Jockey Club",

"Cancha 2":"IPEF",

"Cancha 3":"Alta Gracia"


};






// ============================
// SONIDOS INTERNOS
// ============================


function sonidoOK(){


let audio =
new AudioContext();


let osc =
audio.createOscillator();


osc.frequency.value=800;


osc.connect(audio.destination);


osc.start();


osc.stop(
audio.currentTime+0.15
);


}





function sonidoError(){


let audio =
new AudioContext();


let osc =
audio.createOscillator();


osc.frequency.value=250;


osc.connect(audio.destination);


osc.start();


osc.stop(
audio.currentTime+0.3
);


}







// ============================
// CARGAR CANCHA GUARDADA
// ============================


window.onload=function(){



let guardada =
localStorage.getItem("canchaControl");



if(guardada){


seleccionarCancha(
guardada
);


}



}






// ============================
// SELECCIONAR CANCHA
// ============================


function seleccionarCancha(cancha){



canchaActual=cancha;



localStorage.setItem(
"canchaControl",
cancha
);



document.getElementById(
"selectorCancha"
).style.display="none";



document.getElementById(
"control"
).classList.remove("oculto");



document.getElementById(
"sede"
).innerHTML =

cancha+
"<br>"+
sedes[cancha];



}






function cambiarCancha(){


localStorage.removeItem(
"canchaControl"
);



location.reload();


}
  
// ============================
// INICIAR ESCANEO
// ============================


function iniciarScanner(){



document.getElementById("resultado").innerHTML="";



scanner = new Html5Qrcode("lector");



scanner.start(

{

facingMode:"environment"

},


{

fps:10,

qrbox:260

},


function(codigo){



codigoActual=codigo;



scanner.stop();



validarQR(codigo);



},


function(error){}



)

.catch(function(err){


alert(
"Error cámara: "+err
);


});


}








// ============================
// VALIDAR QR
// ============================


function validarQR(codigo){



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

codigo:codigo,

cancha:canchaActual

})

})


.then(res=>res.json())


.then(data=>{



let resultado =
document.getElementById("resultado");




if(data.estado=="OK"){



sonidoOK();



resultado.innerHTML=`

<div class="ok">

✅ ENTRADA VÁLIDA

</div>



<div class="dato">

<b>ID Compra:</b><br>

${data.compra}

</div>



<div class="dato">

<b>Número de Entrada:</b><br>

${data.codigo}

</div>



<div class="dato">

<b>Nombre:</b><br>

${data.nombre}

</div>



<div class="dato">

<b>DNI:</b><br>

${data.dni}

</div>



<div class="dato">

<b>Día:</b><br>

${data.dia}

</div>



<div class="dato">

<b>Cancha:</b><br>

${data.cancha}

</div>



<div class="dato">

<b>Sede:</b><br>

${sedes[data.cancha]}

</div>


`;



document.getElementById("confirmar")
.classList.remove("oculto");



}



else{


sonidoError();



resultado.innerHTML=`

<div class="error">

❌ ${data.mensaje}

</div>

`;



}




});


}









// ============================
// CONFIRMAR INGRESO
// ============================


function confirmarIngreso(){



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

codigo:codigoActual,

accion:"ingreso"

})

})



.then(res=>res.json())



.then(data=>{



if(data.estado=="OK"){



sonidoOK();



document.getElementById("resultado")
.innerHTML +=

`

<div class="ingreso">

✅ INGRESO REGISTRADO

</div>

`;



document.getElementById("confirmar")
.classList.add("oculto");



document.getElementById("nuevo")
.classList.remove("oculto");



}


});



}









// ============================
// NUEVO ESCANEO
// ============================


function nuevoEscaneo(){



document.getElementById("resultado")
.innerHTML="";



document.getElementById("nuevo")
.classList.add("oculto");



iniciarScanner();



}



</script>


</body>

</html>
