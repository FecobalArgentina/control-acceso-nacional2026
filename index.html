<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Acceso QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>


<style>


body{

font-family:Arial, sans-serif;

background:#f1f1f1;

margin:0;

padding:15px;

text-align:center;

}



.contenedor{

background:white;

max-width:520px;

margin:auto;

padding:20px;

border-radius:18px;

box-shadow:0 3px 12px rgba(0,0,0,.25);

}



.logos{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

}



.logos img{

max-width:120px;

max-height:80px;

object-fit:contain;

}



.titulo{

background:#003b70;

color:white;

padding:18px;

border-radius:15px;

font-size:24px;

font-weight:bold;

}



.subtitulo{

margin-top:15px;

font-size:22px;

font-weight:bold;

color:#003b70;

}



.sede{

font-size:20px;

margin-top:8px;

font-weight:bold;

}



.boton{

width:100%;

padding:20px;

margin-top:20px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:14px;

background:#003b70;

color:white;

}



#lector{

margin-top:20px;

}



#resultado{

margin-top:20px;

font-size:20px;

}



.ok{

background:#d4edda;

color:#155724;

padding:18px;

border-radius:12px;

font-size:25px;

font-weight:bold;

}



.error{

background:#f8d7da;

color:#721c24;

padding:18px;

border-radius:12px;

font-size:22px;

font-weight:bold;

}



.dato{

background:#eeeeee;

padding:14px;

border-radius:10px;

margin-top:10px;

font-size:19px;

}



.ingreso{

background:#003b70;

color:white;

padding:15px;

border-radius:12px;

margin-top:15px;

font-size:22px;

font-weight:bold;

}


</style>


</head>


<body>


<div class="contenedor">



<div class="logos">


<img src="imagenes/logo fecobal.png">


<img src="imagenes/logo cah.png">


</div>




<div class="titulo">

🏆 NACIONAL DE CLUBES<br>

ADULTOS A 2026

</div>



<div class="subtitulo" id="cancha">

CONTROL DE ACCESO

</div>


<div class="sede" id="sede">

</div>




<button class="boton" onclick="iniciarScanner()">

📷 ESCANEAR QR

</button>



<div id="lector"></div>



<div id="resultado"></div>



<button

id="confirmar"

class="boton"

style="display:none"

onclick="confirmarIngreso()">

✅ CONFIRMAR INGRESO

</button>



<button

id="nuevo"

class="boton"

style="display:none"

onclick="nuevoEscaneo()">

🔄 ESCANEAR SIGUIENTE

</button>



</div>
<script>


const API_URL =
"https://script.google.com/macros/s/AKfycbzNB_Xb8n62PgtbQKiVOGshX0bEzadaC-99jRtdPCMp-MeTnXLaOlwfyAwfBIf95uP4/exec";



let codigoActual = "";

let scanner = null;

let canchaActual = "Cancha 1";





// ===============================
// SONIDOS
// ===============================


const sonidoOK = new Audio(
"https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
);


const sonidoError = new Audio(
"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
);







// ===============================
// CONFIGURAR CANCHA
// ===============================


let parametros =
new URLSearchParams(
window.location.search
);


let numeroCancha =
parametros.get("cancha");



if(numeroCancha=="2"){

canchaActual="Cancha 2";

}


if(numeroCancha=="3"){

canchaActual="Cancha 3";

}




let sedes = {

"Cancha 1":"Jockey Club",

"Cancha 2":"IPEF",

"Cancha 3":"Alta Gracia"

};




document.getElementById("cancha").innerHTML =

"CONTROL "+canchaActual;



document.getElementById("sede").innerHTML =

sedes[canchaActual];







// ===============================
// ABRIR CAMARA
// ===============================


function iniciarScanner(){



document.getElementById("resultado").innerHTML="";



scanner = new Html5Qrcode("lector");



scanner.start(

{

facingMode:"environment"

},

{

fps:10,

qrbox:260

},


function(codigo){



codigoActual=codigo;



scanner.stop();



validarQR(codigo);



},


function(error){}



)

.catch(function(err){


alert(
"Error cámara: "+err
);


});



}









// ===============================
// VALIDAR QR
// ===============================


function validarQR(codigo){



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

codigo:codigo,

cancha:canchaActual

})

})

.then(res=>res.json())

.then(data=>{



let resultado =
document.getElementById("resultado");




if(data.estado=="OK"){



sonidoOK.play();



resultado.innerHTML = `



<div class="ok">

✅ ENTRADA VÁLIDA

</div>



<div class="dato">

<b>ID Compra:</b><br>

${data.compra}

</div>




<div class="dato">

<b>Número de Entrada:</b><br>

${data.codigo}

</div>




<div class="dato">

<b>Nombre:</b><br>

${data.nombre}

</div>




<div class="dato">

<b>DNI:</b><br>

${data.dni}

</div>




<div class="dato">

<b>Día:</b><br>

${data.dia}

</div>




<div class="dato">

<b>Cancha:</b><br>

${data.cancha}

</div>



`;



document.getElementById("confirmar")
.style.display="block";



}



else{


sonidoError.play();



resultado.innerHTML = `


<div class="error">

❌ ${data.mensaje}

</div>


`;



}




});



}







// ===============================
// CONFIRMAR INGRESO
// ===============================


function confirmarIngreso(){



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

codigo:codigoActual,

accion:"ingreso"

})

})


.then(res=>res.json())


.then(data=>{



if(data.estado=="OK"){



sonidoOK.play();



document.getElementById("resultado")
.innerHTML +=



`

<div class="ingreso">

✅ INGRESO REGISTRADO

</div>

`;



document.getElementById("confirmar")
.style.display="none";



document.getElementById("nuevo")
.style.display="block";



}



});



}







// ===============================
// NUEVO ESCANEO
// ===============================


function nuevoEscaneo(){



document.getElementById("resultado")
.innerHTML="";



document.getElementById("nuevo")
.style.display="none";



iniciarScanner();



}




</script>


</body>

</html>
