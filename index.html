<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Acceso QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>


<style>

body{
font-family:Arial, sans-serif;
background:#f1f1f1;
margin:0;
padding:15px;
text-align:center;
}


.contenedor{

background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px #aaa;

}


.titulo{

background:#003b70;
color:white;
padding:18px;
border-radius:12px;
font-size:24px;
font-weight:bold;

}


.sede{

margin-top:20px;
font-size:22px;
font-weight:bold;
color:#003b70;

}


.boton{

width:100%;
padding:18px;
margin-top:20px;
font-size:22px;
border:none;
border-radius:12px;
background:#003b70;
color:white;

}


#lector{

margin-top:20px;

}


#resultado{

margin-top:20px;
font-size:20px;

}


.ok{

color:green;
font-weight:bold;

}


.error{

color:red;
font-weight:bold;

}


.dato{

background:#eee;
padding:12px;
border-radius:10px;
margin-top:10px;

}



</style>

</head>



<body>


<div class="contenedor">


<div class="titulo">

🏆 NACIONAL DE CLUBES<br>
ADULTOS A 2026

</div>


<div class="sede" id="sede">

CONTROL DE ACCESO

</div>



<button class="boton" onclick="iniciarScanner()">

📷 ESCANEAR QR

</button>


<div id="lector"></div>


<div id="resultado"></div>


<button 
id="confirmar"
class="boton"
style="display:none"
onclick="confirmarIngreso()">

✅ CONFIRMAR INGRESO

</button>



</div>





<script>


const API_URL = 
"https://script.google.com/macros/s/AKfycbzNB_Xb8n62PgtbQKiVOGshX0bEzadaC-99jRtdPCMp-MeTnXLaOlwfyAwfBIf95uP4/exec";



let codigoActual="";

let canchaActual="Cancha 1";

let scanner;



// ===============================
// LEER CANCHA DESDE URL
// ===============================


let parametros =
new URLSearchParams(
window.location.search
);


let numeroCancha =
parametros.get("cancha");



if(numeroCancha=="2"){

canchaActual="Cancha 2";

}


if(numeroCancha=="3"){

canchaActual="Cancha 3";

}



let sedes={

"Cancha 1":"Jockey Club",

"Cancha 2":"IPEF",

"Cancha 3":"Alta Gracia"

};



document.getElementById("sede").innerHTML =

"CONTROL "+canchaActual+
"<br>"+
sedes[canchaActual];





// ===============================
// ABRIR CAMARA
// ===============================


function iniciarScanner(){


scanner =
new Html5Qrcode("lector");



scanner.start(

{
facingMode:"environment"
},

{

fps:10,

qrbox:250

},


function(codigo){


codigoActual=codigo;


scanner.stop();



validarQR(codigo);



},


function(error){}



)

.catch(function(err){

alert(
"No se pudo abrir la cámara: "+
err
);

});



}





// ===============================
// VALIDAR QR
// ===============================


function validarQR(codigo){



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

codigo:codigo,

cancha:canchaActual

})

})

.then(response=>response.json())

.then(data=>{



let resultado =
document.getElementById("resultado");



if(data.estado=="OK"){



resultado.innerHTML=`

<div class="ok">

✅ ENTRADA VÁLIDA

</div>


<div class="dato">

<b>Nombre:</b><br>

${data.nombre}

</div>


<div class="dato">

<b>DNI:</b><br>

${data.dni}

</div>


<div class="dato">

<b>Día:</b><br>

${data.dia}

</div>


<div class="dato">

<b>Cancha:</b><br>

${data.cancha}

</div>

`;



document.getElementById("confirmar")
.style.display="block";



}

else{


resultado.innerHTML=

`

<div class="error">

❌ ${data.mensaje}

</div>

`;



}



});


}






// ===============================
// CONFIRMAR INGRESO
// ===============================


function confirmarIngreso(){



fetch(API_URL,{

method:"POST",

body:JSON.stringify({

codigo:codigoActual,

accion:"ingreso"

})

})

.then(()=>{


document.getElementById("resultado")
.innerHTML +=

`

<div class="ok">

<br>

✅ INGRESO REGISTRADO

</div>

`;



document.getElementById("confirmar")
.style.display="none";



});



}



</script>


</body>

</html>
